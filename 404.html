<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перенаправление...</title>
  <script>
    // Сохраняем текущий путь и перенаправляем на index.html
    const currentPath = window.location.pathname;
    // Если это не статический файл
    if (!/\.(js|css|png|jpg|jpeg|svg|ico|woff2?|ttf|eot|json)$/i.test(currentPath)) {
      // Перенаправляем на index.html с сохранением пути через hash
      window.location.href = '/rustest' + currentPath;
    }
  </script>
</head>
<body>
  <p>Перенаправление...</p>
</body>
</html>
